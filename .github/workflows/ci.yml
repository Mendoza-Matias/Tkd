name: Tkd CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "develop" ]
    types: [ "opened", "reopened", "synchronize" ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Make mvnw executable
      run: chmod +x mvnw

    - name: Build with Maven
      run: ./mvnw -B package

    - name: Wait commit status # reportar el estado del commit en la pull request y esperar a que se complete el job
      uses: cloudposse/github-action-wait-commit-status@main
      with:
        repository: ${{ github.repository }}
        sha: ${{ github.sha }}
        status: continuous-delivery/example-app
        lookup: "success"
        token: ${{ github.token }}
        check-timeout: 120
        check-retry-count: 5
        check-retry-interval: 20