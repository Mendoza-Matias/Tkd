name: Tkd CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "develop" ]
    types: [ "opened", "reopened", "synchronize" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Make mvnw executable
      run: chmod +x mvnw

    - name: Build with Maven
      run: ./mvnw -B package
